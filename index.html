<style>
:root {
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;
  --border:#e2ddd8;--border2:#ccc8c2;
  --text:#1a1916;--text2:#6b6860;--text3:#9e9b96;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --green:#16a34a;--green-bg:#f0fdf4;--green-text:#15803d;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-text:#b45309;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#b91c1c;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}

.header{background:var(--text);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.header-title{font-size:15px;font-weight:600;letter-spacing:-.3px;}
.header-right{display:flex;align-items:center;gap:12px;}
.header-date{font-size:12px;color:rgba(255,255,255,.55);font-family:'JetBrains Mono',monospace;}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sync-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.7);}
.dot-ok{background:#4ade80;}
.dot-loading{background:#fbbf24;animation:pulse 1s infinite;}
.dot-error{background:#f87171;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 24px;position:sticky;top:56px;z-index:99;overflow-x:auto;}
.nav-btn{padding:0 18px;height:46px;border:none;background:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

.main{padding:24px;max-width:960px;margin:0 auto;}
.section{display:none;}.section.active{display:block;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.card-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;}

.form-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:12px;font-weight:500;color:var(--text2);}

select,input[type=text],input[type=date]{height:38px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;transition:border-color .15s,box-shadow .15s;outline:none;}
select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
input[type=text]::placeholder{color:var(--text3);}
input[type=date]{font-family:'JetBrains Mono',monospace;font-size:13px;cursor:pointer;}
textarea{padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;transition:border-color .15s,box-shadow .15s;outline:none;resize:vertical;min-height:72px;width:100%;}
textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
textarea::placeholder{color:var(--text3);}

.work-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-top:4px;}
.work-check{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;user-select:none;}
.work-check:hover{border-color:var(--accent);background:var(--accent-bg);}
.work-check input[type=checkbox]{margin-top:2px;accent-color:var(--accent);width:15px;height:15px;flex-shrink:0;cursor:pointer;}
.work-check.checked{border-color:var(--accent);background:var(--accent-bg);}
.work-check-name{font-size:13px;font-weight:500;line-height:1.4;}
.work-check-price{font-size:12px;color:var(--text2);margin-top:2px;font-family:'JetBrains Mono',monospace;}

.btn{height:38px;padding:0 18px;border-radius:var(--radius-sm);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border2);background:var(--surface);color:var(--text);white-space:nowrap;}
.btn:hover{background:var(--surface2);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#1d4ed8;}
.btn-sm{height:30px;padding:0 12px;font-size:12px;}
.btn-danger{color:var(--red-text);border-color:#fca5a5;}
.btn-danger:hover{background:var(--red-bg);}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-ok{background:var(--green-bg);color:var(--green-text);}
.badge-over{background:var(--amber-bg);color:var(--amber-text);}
.badge-under{background:var(--red-bg);color:var(--red-text);}
.badge-blue{background:var(--accent-bg);color:var(--accent-text);}

.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;background:var(--surface2);color:var(--text2);margin:2px 2px 2px 0;white-space:nowrap;}
.note-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--amber-bg);color:var(--amber-text);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.stat-val{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1;}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px;}

.worker-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow);}
.worker-block-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2);gap:12px;flex-wrap:wrap;}
.worker-block-name{font-size:15px;font-weight:700;}
.worker-block-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.worker-block-revenue{font-size:14px;font-weight:600;color:var(--accent);font-family:'JetBrains Mono',monospace;}

.search-result-item{border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-top:12px;background:var(--surface);}
.search-serial{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;}
.search-worker{font-size:13px;color:var(--accent);font-weight:600;}

.worker-mgmt-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;background:var(--surface);}

.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;}
.empty-icon{font-size:32px;margin-bottom:10px;}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px;}

.notif{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);z-index:9999;transform:translateY(80px);opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.notif.show{transform:translateY(0);opacity:1;}
.notif.success{background:var(--green);}
.notif.error{background:var(--red);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:360px;max-width:90vw;box-shadow:var(--shadow-md);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:8px;}
.modal-msg{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
.section-title{font-size:18px;font-weight:700;letter-spacing:-.3px;}

.date-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;flex-wrap:wrap;box-shadow:var(--shadow);}
.date-bar-label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;margin-right:4px;}
.date-nav-btn{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
.date-nav-btn:hover{background:var(--surface2);}
.today-btn{height:30px;padding:0 10px;font-size:12px;font-weight:600;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--accent);font-family:'Noto Sans KR',sans-serif;}
.today-btn:hover{background:var(--accent-bg);}
.date-label-text{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;}

/* 기간 조회 바 */
.range-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;flex-wrap:wrap;box-shadow:var(--shadow);}
.range-bar-label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;margin-right:4px;}
.range-sep{font-size:13px;color:var(--text3);}

.date-group-header{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px;margin:16px 0 6px;display:flex;align-items:center;justify-content:space-between;}
.date-group-title{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.date-group-meta{font-size:12px;color:var(--text2);}

.prog-wrap{background:var(--surface2);border-radius:4px;height:6px;margin-top:6px;overflow:hidden;}
.prog-bar{height:100%;border-radius:4px;transition:width .4s;}
.prog-ok{background:var(--green);}
.prog-over{background:var(--amber);}
.prog-under{background:var(--red);}

/* 로그인 화면 */
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;width:360px;max-width:90vw;box-shadow:var(--shadow-md);text-align:center;}
.login-icon{font-size:48px;margin-bottom:12px;}
.login-title{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.login-btn{padding:14px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;transition:all .15s;color:var(--text);}
.login-btn:hover{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.login-divider{font-size:12px;color:var(--text3);margin:12px 0;position:relative;text-align:center;background:var(--surface);display:flex;align-items:center;gap:8px;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.login-master-row{display:flex;gap:8px;}
.login-master-row input{flex:1;}
.current-user-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--accent-bg);color:var(--accent-text);border-radius:99px;font-size:12px;font-weight:600;}

@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(105vh) rotate(720deg);opacity:0;}}
/* 축하 토스트 */
.cheer-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-120px);background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 24px;box-shadow:var(--shadow-md);z-index:9998;opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);text-align:center;min-width:260px;pointer-events:none;}
.cheer-toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.cheer-emoji{font-size:32px;margin-bottom:6px;}
.cheer-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px;}
.cheer-msg{font-size:13px;color:var(--text2);}
</style>
</head>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycby3bgpBeyrAsPsRck3eWnFnfJ5umLhm1K9Yp9Jfol2NT77qyy02IREPj3-YT-R_phLYKw/exec';
const HOLIDAY_KEY = 'f52c0659526679a86d04083efd86dff68943cae2fa05a623ff8606b79f3f6814';
const MASTER_NAME = '최민규';

const WORKS = {
  pcb:    { label:'PCB 교체 (+S/N 라이팅)',               price:15180 },
  panel:  { label:'일체형 패널 교체 (액정 보호필름 부착)', price:10450 },
  board:  { label:'메인보드 부분 수리 (충전단자 포함)',     price:10450 },
  nonbat: { label:'논배터리 작업',                         price:18700 },
};
const DAYS = ['일','월','화','수','목','금','토'];

let entries = [], workers = [], busy = false;
let kpiMap = {};
let holidayCache = {};

const fmt = n => Number(n).toLocaleString();
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const fmtDT = v => {
  if(!v) return '';
  const d = new Date(v);
  if(isNaN(d)) return String(v);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};
const dateLabel = ds => {
  if(!ds) return '';
  const d = new Date(ds+'T00:00:00');
  return `${ds.replace(/-/g,'.')} ${DAYS[d.getDay()]}요일${ds===todayStr()?' (오늘)':''}`;
};
const parseWorks = w => {
  if(Array.isArray(w)) return w;
  try { return JSON.parse(w); } catch { return String(w).split(',').filter(Boolean); }
};

/* JSONP */
function gasCall(params) {
  return new Promise((resolve, reject) => {
    const cb = '__gas_' + Date.now() + '_' + (Math.random()*1e6|0);
    const qs = Object.entries({...params, callback:cb})
      .map(([k,v])=>`${encodeURIComponent(k)}=${encodeURIComponent(String(v))}`).join('&');
    const s = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('timeout')); }, 20000);
    window[cb] = data => { cleanup(); resolve(data); };
    s.onerror = ()=>{ cleanup(); reject(new Error('error')); };
    s.src = GAS + '?' + qs;
    document.head.appendChild(s);
    function cleanup(){ clearTimeout(timer); delete window[cb]; s.remove(); }

/* 전체 로드 */
async function syncData(silent=false) {
  setSyncStatus('loading');
  try {
    const data = await gasCall({action:'load'});
    entries = data.entries || [];
    workers = data.workers || [];
    const rawKpi = data.kpiMap || {};
    kpiMap = {};
    Object.entries(rawKpi).forEach(([k, v]) => {
      const ks = String(k);
      // 정상: 2026-04 형식
      if(/^\d{4}-\d{2}$/.test(ks)) { kpiMap[ks] = Number(v); return; }
      // 비정상: YYYY-MM 패턴 추출
      const m1 = ks.match(/(\d{4})-(\d{2})/);
      if(m1) { kpiMap[`${m1[1]}-${m1[2]}`] = Number(v); return; }
      // 비정상: "Wed Apr 01 2026..." 형식 → Date로 파싱
      try {
        const d2 = new Date(ks);
        if(!isNaN(d2)) {
          const y2 = d2.getFullYear();
          const mo2 = String(d2.getMonth()+1).padStart(2,'0');
          kpiMap[`${y2}-${mo2}`] = Number(v);
        }
      } catch {}
    });
    setSyncStatus('ok');
    renderAll();
    if(!silent) notify('데이터를 불러왔습니다.');
    if(!currentUser) buildLoginGrid();
  } catch {
    setSyncStatus('error');
    if(!silent) notify('서버 연결 실패. 인터넷을 확인하세요.','error');
  }
}

}

/* ===== 공휴일 API ===== */
async function fetchHolidays(year, month) {
  const key = `${year}-${String(month).padStart(2,'0')}`;
  if(holidayCache[key] !== undefined) return holidayCache[key];
  return new Promise(resolve => {
    const cb = '__holi_' + Date.now();
    const url = `https://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService/getHoliDeInfo?serviceKey=${HOLIDAY_KEY}&solYear=${year}&solMonth=${String(month).padStart(2,'0')}&_type=json&numOfRows=50&callback=${cb}`;
    const s = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); holidayCache[key]=[]; resolve([]); }, 5000);
    window[cb] = (json) => {
      cleanup();
      try {
        const items = json?.response?.body?.items?.item;
        let dates = [];
        if(items) {
          const arr = Array.isArray(items) ? items : [items];
          dates = arr.filter(it=>it.isHoliday==='Y').map(it => {
            const s2 = String(it.locdate);
            return `${s2.slice(0,4)}-${s2.slice(4,6)}-${s2.slice(6,8)}`;
          });
        }
        holidayCache[key] = dates;
        resolve(dates);
      } catch { holidayCache[key]=[]; resolve([]); }
    };
    s.onerror = ()=>{ cleanup(); holidayCache[key]=[]; resolve([]); };
    s.src = url;
    document.head.appendChild(s);
    function cleanup(){ clearTimeout(timer); delete window[cb]; s.remove(); }
  });
}

async function getWorkdays(year, month) {
  const holidays = await fetchHolidays(year, month);
  const daysInMonth = new Date(year, month, 0).getDate();
  let count = 0;
  for(let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(year, month-1, d);
    const dow = dt.getDay();
    if(dow === 0 || dow === 6) continue;
    const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(holidays.includes(ds)) continue;
    count++;
  }
  return count;
}

async function getDailyTarget(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const y = d.getFullYear(), m = d.getMonth()+1;
  const monthKey = `${y}-${String(m).padStart(2,'0')}`;
  const monthKPI = kpiMap[monthKey] || 0;
  if(!monthKPI) return 0;
  const activeWorkers = workers.filter(w => w !== MASTER_NAME).length;
  if(!activeWorkers) return 0;
  const workdays = await getWorkdays(y, m);
  if(!workdays) return 0;
  return Math.ceil(monthKPI / workdays / activeWorkers);
}

  const d = new Date(sel+'T00:00:00'), y = d.getFullYear(), m = d.getMonth()+1;

  const monthKPI = kpiMap[monthKey] || 0;
  const workdays = monthKPI ? await getWorkdays(y, m) : 0;

  const totalTarget = dailyTarget > 0 ? activeWorkers.length * dailyTarget : 0;
  const progressColor = totalTarget > 0 ? (list.length >= totalTarget ? 'var(--green)' : 'var(--red)') : 'var(--text2)';

  // 목표 달성 축하 체크
  checkAchievements(list, dailyTarget, activeWorkers);

    const wl = list.filter(e=>e.worker===w);
    const cnt = wl.length, wrev = wl.reduce((s,e)=>s+Number(e.total),0);
    const target = dailyTarget || 0;
    const diff = target ? cnt - target : 0;
    const pct = target ? Math.min(100, Math.round(cnt/target*100)) : 0;
    let bc,bt,pc;
    if(!target){bc='badge-blue';bt='KPI 미설정';pc='prog-ok';}
    else if(diff>0){bc='badge-over';bt=`${diff}건 초과`;pc='prog-over';}
    else if(diff<0){bc='badge-under';bt=`${Math.abs(diff)}건 미달`;pc='prog-under';}
    else{bc='badge-ok';bt='목표 달성';pc='prog-ok';}
    const tbl = wl.length
      ? `<div class="table-wrap"><table>
          <thead><tr><th>시리얼 번호</th><th>수리 항목</th><th>특이사항</th><th style="text-align:right">공임비</th></tr></thead>
          <tbody>${wl.map(e=>{const ws=parseWorks(e.works);return`<tr>
            <td class="mono">${e.serial}</td>
            <td>${ws.map(k=>`<span class="tag">${WORKS[k]?.label||k}</span>`).join('')}</td>
            <td>${e.note?`<span class="note-badge" title="${e.note}">${e.note}</span>`:'<span style="color:var(--text3);font-size:11px;">-</span>'}</td>
            <td style="text-align:right;font-weight:600;font-family:'JetBrains Mono',monospace;font-size:12px;">${fmt(e.total)}원</td>
          </tr>`;}).join('')}</tbody></table></div>`
      : '<div class="empty" style="padding:20px;">수리 내역 없음</div>';
    return `<div class="worker-block">
      <div class="worker-block-header">
        <div><div class="worker-block-name">${w}</div>
          <div class="prog-wrap" style="width:160px;margin-top:6px;">
            <div class="prog-bar ${pc}" style="width:${pct}%"></div></div></div>
        <div class="worker-block-meta">
          <span style="font-size:13px;color:var(--text2);">${cnt} / ${target||'?'}건</span>
          <span class="badge ${bc}">${bt}</span>
          <span class="worker-block-revenue">${fmt(wrev)}원</span>
        </div>
      </div><div>${tbl}</div></div>`;
  }).join('');
}

        const done = allMonthEntries.length;
        const remain = Math.max(0, monthKPI - done);
        const pct = Math.min(100, Math.round(done/monthKPI*100));
        const wd = await getWorkdays(y, m);
        const ac = workers.filter(w=>w!==MASTER_NAME).length;
        const daily = ac && wd ? Math.ceil(monthKPI/wd/ac) : 0;
        const progColor = pct>=100?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
        kpiHtml = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);width:100%;">

              <div style="font-size:17px;font-weight:700;">${fmt(monthKPI)}<span style="font-size:11px;color:var(--text2);">대</span></div>

            </div>
            <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:12px;">

      <td></td>
    </tr></tfoot>
  </table></div></div>`;

  el.innerHTML = h;

function exportReportCSV() {
  const monthVal = document.getElementById('report-month').value;
  if(!monthVal){ notify('년월을 선택하세요.','error'); return; }
  const [y, m] = monthVal.split('-').map(Number);
  const monthKPI = kpiMap[monthVal] || 0;
  const monthEntries = entries.filter(e => String(e.date).startsWith(monthVal));
  const activeWorkers = workers.filter(w => w !== MASTER_NAME);
  const totalDone = monthEntries.length;
  const totalRev = monthEntries.reduce((s,e)=>s+Number(e.total),0);
  const pct = monthKPI ? Math.min(100, Math.round(totalDone/monthKPI*100)) : 0;

  const hd = '엔지니어,수리건수,월목표,달성률(%),공임비합계(원)';
  const ls = activeWorkers.map(w => {
    const wEntries = monthEntries.filter(e=>e.worker===w);
    const cnt = wEntries.length;
    const wrev = wEntries.reduce((s,e)=>s+Number(e.total),0);
    return `${w},${cnt},${monthKPI||'-'},${monthKPI?Math.round(cnt/(monthKPI/activeWorkers.length)*100)+'%':'-'},${wrev}`;
  });
  ls.push(`합계,${totalDone},${monthKPI||'-'},${monthKPI?pct+'%':'-'},${totalRev}`);

  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+[hd,...ls].join('\n')],{type:'text/csv'}));
  a.download = `폼즈AS_실적리포트_${monthVal}.csv`;
  a.click(); notify('실적 리포트 CSV 내보내기 완료!');
}

/* ===== KPI 설정 ===== */
async function renderKPI() {
  const isM = isMaster;
  document.getElementById('kpi-form').style.display = isM ? 'block' : 'none';
  document.getElementById('kpi-master-only').style.display = isM ? 'none' : 'block';
  if(!isM) return;
  const now = new Date();
  if(!document.getElementById('kpi-month').value) {
    document.getElementById('kpi-month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  }
  renderKPIList();
}

function renderKPIList() {
  const el = document.getElementById('kpi-list');
  const keys = Object.keys(kpiMap).sort((a,b)=>b.localeCompare(a));
  if(!keys.length){ el.innerHTML='<div class="empty" style="padding:20px;">저장된 KPI가 없습니다.</div>'; return; }
  el.innerHTML = keys.map(k=>{
    const [ky, km2] = k.split('-');
    const label = `${ky}년 ${Number(km2)}월`;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);">
      <div>
        <span style="font-weight:600;">${label}</span>
        <span style="color:var(--text2);font-size:13px;margin-left:12px;">월 목표 ${fmt(kpiMap[k])}대</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:12px;color:var(--text3);" id="wd-${k.replace('-','_')}">계산 중...</span>
        <button class="btn btn-sm btn-danger" onclick="deleteKPI('${k}')">삭제</button>
      </div>
    </div>`;
  }).join('');
  // 각 월 평일 수 표시
  keys.forEach(async k => {
    const [y,m] = k.split('-').map(Number);
    const wd = await getWorkdays(y, m);
    const ac = workers.filter(w=>w!==MASTER_NAME).length;
    const daily = ac ? Math.ceil(kpiMap[k]/wd/ac) : 0;
    const el2 = document.getElementById('wd-'+k.replace('-','_'));
    if(el2) el2.textContent = `평일 ${wd}일 · 1인 하루 ${daily}건`;
  });
}

async function updateKPIPreview() {
  const monthVal = document.getElementById('kpi-month').value;
  const kpiVal = Number(document.getElementById('kpi-value').value);
  const el = document.getElementById('kpi-calc-preview');
  if(!monthVal || !kpiVal){ el.textContent=''; return; }
  const [y,m] = monthVal.split('-').map(Number);
  const wd = await getWorkdays(y, m);
  const ac = workers.filter(w=>w!==MASTER_NAME).length;
  const daily = ac && wd ? Math.ceil(kpiVal/wd/ac) : 0;
  el.textContent = `→ 평일 ${wd}일 기준 · 작업자 ${ac}명 · 1인 하루 목표 ${daily}건`;
}

async function saveKPI() {
  const monthVal = document.getElementById('kpi-month').value;
  const kpiVal = Number(document.getElementById('kpi-value').value);
  if(!monthVal){ notify('년월을 선택하세요.','error'); return; }
  if(!kpiVal || kpiVal <= 0){ notify('목표 수량을 입력하세요.','error'); return; }
  // 저장 전 최신 서버 데이터 한 번 더 불러오기
  try {
    const latest = await gasCall({action:'load'});
    const raw = latest.kpiMap || {};
    kpiMap = {};
    Object.entries(raw).forEach(([k,v])=>{
      if(/^\d{4}-\d{2}$/.test(k)){ kpiMap[k]=v; return; }
      const m2 = String(k).match(/(\d{4})-(\d{2})/);
      if(m2) kpiMap[`${m2[1]}-${m2[2]}`]=v;
    });
  } catch {}
  kpiMap[monthVal] = kpiVal;
  const kpiData = Object.entries(kpiMap).map(([k,v])=>`${k}:${v}`).join('||');
  try {
    await gasCall({action:'saveKPI', kpiData});
    document.getElementById('kpi-value').value = '';
    // 저장 완료 후 서버에서 다시 불러와서 확인
    const verify = await gasCall({action:'load'});
    const raw2 = verify.kpiMap || {};
    kpiMap = {};
    Object.entries(raw2).forEach(([k,v])=>{
      if(/^\d{4}-\d{2}$/.test(k)){ kpiMap[k]=v; return; }
      const m2 = String(k).match(/(\d{4})-(\d{2})/);
      if(m2) kpiMap[`${m2[1]}-${m2[2]}`]=v;
    });
    renderKPIList();
    notify(`${monthVal} KPI ${fmt(kpiVal)}대 저장 완료!`);
  } catch { notify('저장 실패. 다시 시도해주세요.','error'); }
}

function deleteKPI(key) {
  const [ky, km2] = key.split('-');
  openModal('KPI 삭제', `${ky}년 ${Number(km2)}월 KPI를 삭제할까요?`, async()=>{
    delete kpiMap[key];
    const kpiData = Object.entries(kpiMap).map(([k,v])=>`${k}:${v}`).join('||');
    try {
      await gasCall({action:'saveKPI', kpiData});
      // 삭제 후 서버에서 다시 확인
      const verify = await gasCall({action:'load'});
      const raw = verify.kpiMap || {};
      kpiMap = {};
      Object.entries(raw).forEach(([k,v])=>{
        if(/^\d{4}-\d{2}$/.test(k)){ kpiMap[k]=v; return; }
        const m2 = String(k).match(/(\d{4})-(\d{2})/);
        if(m2) kpiMap[`${m2[1]}-${m2[2]}`]=v;
      });
      renderKPIList();
      notify('삭제되었습니다.');
    } catch { notify('삭제 실패.','error'); }
  });
}

/* ===== 축하 팡파레 ===== */
let cheerTimer, cheerTimer2;
let alreadyCheered = new Set(); // 이미 축하한 엔지니어 (날짜별)

function launchConfetti() {
  const colors = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#db2777'];
  const count = 120;
  for(let i = 0; i < count; i++) {
    setTimeout(()=>{
      const el = document.createElement('div');
      const color = colors[Math.floor(Math.random()*colors.length)];
      const size = Math.random()*8+4;
      const left = Math.random()*100;
      const duration = Math.random()*2+1.5;
      el.style.cssText = `position:fixed;top:-10px;left:${left}vw;width:${size}px;height:${size}px;background:${color};border-radius:${Math.random()>0.5?'50%':'2px'};z-index:9997;pointer-events:none;animation:confettiFall ${duration}s ease-in forwards;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), duration*1000+100);
    }, i*15);
  }
}

function showCheer(name) {
  const emojis = ['🎉','🏆','🥳','🎊','⭐','🔥'];
  const msgs = ['목표 건수를 달성했습니다!','오늘의 목표 완료!','훌륭해요! 목표 달성!','최고입니다!'];
  const el = document.getElementById('cheer-toast');
  document.getElementById('cheer-emoji').textContent = emojis[Math.floor(Math.random()*emojis.length)];
  document.getElementById('cheer-name').textContent = name + '님';
  document.getElementById('cheer-msg').textContent = msgs[Math.floor(Math.random()*msgs.length)];
  el.classList.add('show');
  launchConfetti();
  clearTimeout(cheerTimer);
  cheerTimer = setTimeout(()=>el.classList.remove('show'), 4000);
}

function checkAchievements(list, dailyTarget, activeWorkers) {
  if(!dailyTarget) return;
  const sel = getDate('summary');
  activeWorkers.forEach(w => {
    const key = `${sel}_${w}`;
    const cnt = list.filter(e=>e.worker===w).length;
    if(cnt >= dailyTarget && !alreadyCheered.has(key)) {
      alreadyCheered.add(key);
      setTimeout(()=>showCheer(w), 300);
    }
  });
}

let lastSearch = '';

/* 시리얼 조회용 삭제 */
function delSearch(id) {
  const e = entries.find(x=>String(x.id)===String(id)); if(!e) return;
  openModal('수리 내역 삭제',`${e.serial} (${e.worker}) 수리 내역을 삭제할까요?`, async()=>{
    try {
      await gasCall({action:'delete', id});
      entries = entries.filter(x=>String(x.id)!==String(id));
      renderToday(); doSearch();
      notify('삭제되었습니다.');
    } catch { notify('삭제 실패. 다시 시도해주세요.','error'); }
  });
}

/* 엔지니어 관리 */
async function addWorker() {
  const n = document.getElementById('inp-worker').value.trim();
  if(!n){ notify('이름을 입력하세요.','error'); return; }
  if(workers.includes(n)){ notify('이미 있는 엔지니어입니다.','error'); return; }
  workers.push(n);
  try {
    await gasCall({action:'saveWorkers', workers:workers.join('||')});
    document.getElementById('inp-worker').value = '';
    renderWorkerSel(); renderWorkers(); notify(`${n} 추가됨`);
  } catch { workers.pop(); notify('저장 실패. 다시 시도해주세요.','error'); }
}
document.getElementById('inp-worker').addEventListener('keydown', e=>{if(e.key==='Enter')addWorker();});

function removeWorker(name) {
  const cnt = entries.filter(e=>e.worker===name).length;
  openModal('엔지니어 삭제',
    cnt ? `"${name}" 엔지니어를 목록에서 제거합니다. (기존 수리 기록 ${cnt}건은 유지됩니다.) 계속할까요?`
        : `"${name}" 엔지니어를 삭제할까요?`,
    async()=>{
      workers = workers.filter(w=>w!==name);
      try {
        await gasCall({action:'saveWorkers', workers:workers.join('||')});
        renderWorkerSel(); renderWorkers(); notify(`${name} 삭제됨`);
      } catch { notify('삭제 실패.','error'); }
    });
}
function renderWorkers() {
  const el = document.getElementById('worker-list');
  if(!workers.length){ el.innerHTML='<div class="empty">등록된 엔지니어가 없습니다.</div>'; return; }
  const ts = todayStr();
  el.innerHTML = workers.map(w=>{
    const ct = entries.filter(e=>e.worker===w&&String(e.date).startsWith(ts)).length;
    const ca = entries.filter(e=>e.worker===w).length;
    return `<div class="worker-mgmt-item">
      <div><span style="font-size:14px;font-weight:500;">${w}</span>
        <span style="font-size:12px;color:var(--text2);margin-left:8px;">오늘 ${ct}건 / 전체 ${ca}건</span>
      </div>
      ${isMaster ? `<button class="btn btn-sm btn-danger" onclick="removeWorker('${w}')">삭제</button>` : '<span style="font-size:11px;color:var(--text3);">마스터 전용</span>'}
    </div>`;
  }).join('');
}

/* CSV */
function exportCSV(mode) {
  let rows, fn;
  if(mode==='range') {
    rows = getRangeEntries().sort((a,b)=>new Date(b.date)-new Date(a.date));
    const from = document.getElementById('date-from').value || '전체';
    const to = document.getElementById('date-to').value || '전체';
    fn = `폼즈AS_${from}_${to}.csv`;
  } else {
    const sel = getDate('input');
    rows = entries.filter(e=>String(e.date).startsWith(sel));
    fn = `폼즈AS_${sel}.csv`;
  }
  if(!rows.length){ notify('내보낼 데이터가 없습니다.','error'); return; }
  const hd = '번호,날짜,엔지니어,시리얼번호,수리항목,공임비(원),특이사항,등록시각';
  const ls = rows.map((e,i)=>{
    const ws = parseWorks(e.works);
    return `${i+1},${String(e.date).slice(0,10)},${e.worker},${e.serial},"${ws.map(k=>WORKS[k]?.label||k).join(' / ')}",${e.total},"${e.note||''}",${fmtDT(e.date)}`;
  });
  const totalRev = rows.reduce((s,e)=>s+Number(e.total),0);
  const summary = `,,,,합계,${totalRev},,`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+[hd,...ls,summary].join('\n')],{type:'text/csv'}));
  a.download = fn; a.click(); notify('CSV 내보내기 완료!');
}
