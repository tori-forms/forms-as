<style>
:root {
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;
  --border:#e2ddd8;--border2:#ccc8c2;
  --text:#1a1916;--text2:#6b6860;--text3:#9e9b96;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --green:#16a34a;--green-bg:#f0fdf4;--green-text:#15803d;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-text:#b45309;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#b91c1c;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}

.header{background:var(--text);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.header-title{font-size:15px;font-weight:600;letter-spacing:-.3px;}
.header-right{display:flex;align-items:center;gap:12px;}
.header-date{font-size:12px;color:rgba(255,255,255,.55);font-family:'JetBrains Mono',monospace;}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sync-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.7);}
.dot-ok{background:#4ade80;}
.dot-loading{background:#fbbf24;animation:pulse 1s infinite;}
.dot-error{background:#f87171;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 24px;position:sticky;top:56px;z-index:99;overflow-x:auto;}
.nav-btn{padding:0 18px;height:46px;border:none;background:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

.main{padding:24px;max-width:960px;margin:0 auto;}
.section{display:none;}.section.active{display:block;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.card-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;}

.form-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:12px;font-weight:500;color:var(--text2);}

select,input[type=text],input[type=date]{height:38px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;transition:border-color .15s,box-shadow .15s;outline:none;}
select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
input[type=text]::placeholder{color:var(--text3);}
input[type=date]{font-family:'JetBrains Mono',monospace;font-size:13px;cursor:pointer;}
textarea{padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;transition:border-color .15s,box-shadow .15s;outline:none;resize:vertical;min-height:72px;width:100%;}
textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
textarea::placeholder{color:var(--text3);}

.work-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-top:4px;}
.work-check{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;user-select:none;}
.work-check:hover{border-color:var(--accent);background:var(--accent-bg);}
.work-check input[type=checkbox]{margin-top:2px;accent-color:var(--accent);width:15px;height:15px;flex-shrink:0;cursor:pointer;}
.work-check.checked{border-color:var(--accent);background:var(--accent-bg);}
.work-check-name{font-size:13px;font-weight:500;line-height:1.4;}
.work-check-price{font-size:12px;color:var(--text2);margin-top:2px;font-family:'JetBrains Mono',monospace;}

.btn{height:38px;padding:0 18px;border-radius:var(--radius-sm);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border2);background:var(--surface);color:var(--text);white-space:nowrap;}
.btn:hover{background:var(--surface2);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#1d4ed8;}
.btn-sm{height:30px;padding:0 12px;font-size:12px;}
.btn-danger{color:var(--red-text);border-color:#fca5a5;}
.btn-danger:hover{background:var(--red-bg);}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-ok{background:var(--green-bg);color:var(--green-text);}
.badge-over{background:var(--amber-bg);color:var(--amber-text);}
.badge-under{background:var(--red-bg);color:var(--red-text);}
.badge-blue{background:var(--accent-bg);color:var(--accent-text);}

.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;background:var(--surface2);color:var(--text2);margin:2px 2px 2px 0;white-space:nowrap;}
.note-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:var(--amber-bg);color:var(--amber-text);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.stat-val{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1;}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px;}

.worker-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow);}
.worker-block-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2);gap:12px;flex-wrap:wrap;}
.worker-block-name{font-size:15px;font-weight:700;}
.worker-block-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.worker-block-revenue{font-size:14px;font-weight:600;color:var(--accent);font-family:'JetBrains Mono',monospace;}

.search-result-item{border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-top:12px;background:var(--surface);}
.search-serial{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;}
.search-worker{font-size:13px;color:var(--accent);font-weight:600;}

.worker-mgmt-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;background:var(--surface);}

.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;}
.empty-icon{font-size:32px;margin-bottom:10px;}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px;}

.notif{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);z-index:9999;transform:translateY(80px);opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.notif.show{transform:translateY(0);opacity:1;}
.notif.success{background:var(--green);}
.notif.error{background:var(--red);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:360px;max-width:90vw;box-shadow:var(--shadow-md);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:8px;}
.modal-msg{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
.section-title{font-size:18px;font-weight:700;letter-spacing:-.3px;}

.date-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;flex-wrap:wrap;box-shadow:var(--shadow);}
.date-bar-label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;margin-right:4px;}
.date-nav-btn{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
.date-nav-btn:hover{background:var(--surface2);}
.today-btn{height:30px;padding:0 10px;font-size:12px;font-weight:600;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--accent);font-family:'Noto Sans KR',sans-serif;}
.today-btn:hover{background:var(--accent-bg);}
.date-label-text{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;}

/* 기간 조회 바 */
.range-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;flex-wrap:wrap;box-shadow:var(--shadow);}
.range-bar-label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;margin-right:4px;}
.range-sep{font-size:13px;color:var(--text3);}

.date-group-header{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px;margin:16px 0 6px;display:flex;align-items:center;justify-content:space-between;}
.date-group-title{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.date-group-meta{font-size:12px;color:var(--text2);}

.prog-wrap{background:var(--surface2);border-radius:4px;height:6px;margin-top:6px;overflow:hidden;}
.prog-bar{height:100%;border-radius:4px;transition:width .4s;}
.prog-ok{background:var(--green);}
.prog-over{background:var(--amber);}
.prog-under{background:var(--red);}

/* 로그인 화면 */
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;width:360px;max-width:90vw;box-shadow:var(--shadow-md);text-align:center;}
.login-icon{font-size:48px;margin-bottom:12px;}
.login-title{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.login-btn{padding:14px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;transition:all .15s;color:var(--text);}
.login-btn:hover{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.login-divider{font-size:12px;color:var(--text3);margin:12px 0;position:relative;text-align:center;background:var(--surface);display:flex;align-items:center;gap:8px;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.login-master-row{display:flex;gap:8px;}
.login-master-row input{flex:1;}
.current-user-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--accent-bg);color:var(--accent-text);border-radius:99px;font-size:12px;font-weight:600;}

@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(105vh) rotate(720deg);opacity:0;}}
/* 축하 토스트 */
.cheer-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-120px);background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 24px;box-shadow:var(--shadow-md);z-index:9998;opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);text-align:center;min-width:260px;pointer-events:none;}
.cheer-toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.cheer-emoji{font-size:32px;margin-bottom:6px;}
.cheer-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px;}
.cheer-msg{font-size:13px;color:var(--text2);}
</style>
</head>

  <button class="nav-btn" onclick="switchTab('kpi',this)">KPI 설정</button>

<div class="main">

  <!-- 수리 입력 -->
  <div id="tab-input" class="section active">
    <div class="section-header">
      <span class="section-title">수리 입력</span>
      <button class="btn btn-sm" onclick="syncData()">🔄 새로고침</button>
    </div>
    <div class="card">
      <div class="card-title">수리 정보 입력</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">엔지니어</label>
          <select id="sel-worker" style="width:150px;"></select>
        </div>
        <div class="form-group">
          <label class="form-label">시리얼 번호</label>
          <input type="text" id="inp-serial" placeholder="예: SN12345678" style="width:200px;" oninput="this.value=this.value.toUpperCase();autoDetectModel();">
        </div>
        <div class="form-group">
          <label class="form-label">기종</label>
          <div style="display:flex;align-items:center;gap:8px;">
            <span id="model-auto" style="display:none;font-size:13px;font-weight:700;color:#fff;background:var(--accent);padding:3px 12px;border-radius:99px;"></span>
            <input type="text" id="inp-model" placeholder="직접 입력 (예: S3)" style="width:130px;">
          </div>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">수리 항목 (복수 선택 가능)</label>
        <div class="work-grid" id="work-checks"></div>
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">특이사항 <span style="color:var(--text3);font-weight:400;">(선택)</span></label>
        <textarea id="inp-note" placeholder="특이사항을 입력하세요. 없으면 공란으로 두셔도 됩니다."></textarea>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="btn btn-primary" id="btn-add" onclick="addEntry()">수리 등록</button>
        <span id="price-preview" style="font-size:13px;color:var(--text2);"></span>
      </div>
    </div>

  <!-- hidden elements for compatibility -->
  <input type="date" id="date-input" style="display:none;">
  <span id="lbl-input" style="display:none;"></span>
  <span id="today-count" style="display:none;"></span>
  <div id="today-list" style="display:none;"></div>
  </div>

  <!-- 일일 현황 -->
  <div id="tab-summary" class="section">
    <div class="section-header">
      <span class="section-title">일일 현황</span>
      <button class="btn btn-sm" onclick="syncData()">🔄 새로고침</button>
    </div>
    <div class="date-bar">
      <span class="date-bar-label">마감 날짜</span>
      <button class="date-nav-btn" onclick="moveDate('summary',-1)">‹</button>
      <input type="date" id="date-summary" onchange="renderSummary()" style="width:148px;">
      <button class="date-nav-btn" onclick="moveDate('summary',1)">›</button>
      <button class="today-btn" onclick="setToday('summary')">오늘</button>
      <span class="date-label-text" id="lbl-summary"></span>
    </div>
    <div id="summary-stats" class="stat-grid"></div>
    <div id="summary-workers"></div>
  </div>

  <!-- 전체 기록 -->
  <div id="tab-history" class="section">
    <div class="section-header">
      <span class="section-title">전체 기록</span>
      <button class="btn btn-sm" onclick="exportCSV('range')">기간 CSV 내보내기</button>
    </div>

    <!-- 기간 조회 -->
    <div class="range-bar">
      <span class="range-bar-label">기간 조회</span>
      <input type="date" id="date-from" onchange="renderHistory()" style="width:148px;">
      <span class="range-sep">~</span>
      <input type="date" id="date-to" onchange="renderHistory()" style="width:148px;">
      <button class="today-btn" onclick="setRangeMonth()">이번 달</button>
      <button class="today-btn" onclick="setRangeAll()">전체</button>
    </div>
    <div class="range-bar" style="margin-top:-8px;">
      <span class="range-bar-label">엔지니어 필터</span>
      <select id="history-worker-filter" onchange="renderHistory()" style="width:160px;">
        <option value="">전체</option>
      </select>
    </div>

    <div id="history-stats"></div>
    <div id="history-content"></div>
  </div>

  <!-- 시리얼 조회 -->
  <div id="tab-search" class="section">
    <div class="section-title" style="margin-bottom:16px;">시리얼 번호 조회</div>
    <div class="card">
      <div class="form-row">
        <div class="form-group" style="flex:1;">
          <label class="form-label">시리얼 번호</label>
          <input type="text" id="inp-search" placeholder="시리얼 번호 전체 또는 일부 입력" style="width:100%;max-width:300px;" oninput="this.value=this.value.toUpperCase()">
        </div>
        <button class="btn btn-primary" onclick="doSearch()">조회</button>
      </div>
    </div>
    <div id="search-result"></div>
  </div>

  <!-- 실적 리포트 -->
  <div id="tab-report" class="section">
    <div class="section-header">
      <span class="section-title">📈 월별 실적 리포트</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="month" id="report-month" style="height:38px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;outline:none;">
        <button class="btn btn-primary" onclick="renderReport()">조회</button>
        <button class="btn btn-sm" onclick="exportReportCSV()">CSV 내보내기</button>
      </div>
    </div>
    <div id="report-master-only" style="display:none;">
      <div class="empty">⚙️ 마스터만 실적 리포트를 볼 수 있습니다.</div>
    </div>
    <div id="report-content"></div>
  </div>

  <!-- KPI 설정 -->
  <div id="tab-kpi" class="section">
    <div class="section-title" style="margin-bottom:16px;">KPI 설정</div>
    <div class="card" id="kpi-master-only" style="display:none;">
      <div style="color:var(--text3);font-size:13px;text-align:center;padding:10px;">⚙️ 마스터만 KPI를 설정할 수 있습니다.</div>
    </div>
    <div id="kpi-form">
      <div class="card">
        <div class="card-title">월별 KPI 입력</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">년월 선택</label>
            <input type="month" id="kpi-month" style="height:38px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;outline:none;">
          </div>
          <div class="form-group">
            <label class="form-label">월 목표 수량</label>
            <input type="text" id="kpi-value" placeholder="예: 500" style="width:140px;">
          </div>
          <button class="btn btn-primary" onclick="saveKPI()">저장</button>
        </div>
        <div id="kpi-calc-preview" style="font-size:13px;color:var(--text2);margin-top:4px;"></div>
      </div>
      <div class="card" style="padding:0;">
        <div style="padding:14px 18px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);">저장된 KPI 목록</div>
        <div id="kpi-list"></div>
      </div>
    </div>
  </div>

  <!-- 재고 관리 -->
  <div id="tab-stock" class="section">
    <div class="section-header">
      <span class="section-title">📦 재고 관리</span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-sm btn-primary" onclick="openAddPartModal()" id="add-part-btn" style="display:none;">+ 부품 추가</button>
        <button class="btn btn-sm" onclick="syncData(true);renderStock();">🔄 새로고침</button>
      </div>
    </div>
    <div id="stock-content"></div>
  </div>

  <!-- 교육 자료 -->
  <div id="tab-docs" class="section">
    <div class="section-header">
      <span class="section-title">📚 교육 자료</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="docs-category-filter" onchange="renderDocs()" style="width:140px;">
          <option value="">전체 카테고리</option>
        </select>
        <button class="btn btn-sm btn-primary" id="add-doc-btn" style="display:none;" onclick="openAddDocModal()">+ 자료 추가</button>
      </div>
    </div>
    <div id="docs-content"></div>
  </div>

  <!-- 엔지니어 관리 -->
  <div id="tab-workers" class="section">
    <div class="section-title" style="margin-bottom:16px;">엔지니어 관리</div>
    <div class="card">
      <div class="card-title">엔지니어 추가</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">이름</label>
          <input type="text" id="inp-worker" placeholder="예: 홍길동" style="width:180px;">
        </div>
        <button class="btn btn-primary" onclick="addWorker()">추가</button>
      </div>
    </div>
    <div id="worker-list"></div>
  </div>

</div>

<!-- 로그인 화면 -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-icon">👨‍🔧</div>
    <div class="login-title">엔지니어 확인</div>
    <div class="login-sub">본인 이름을 선택해주세요</div>
    <div class="login-grid" id="login-grid"></div>
    <div class="login-divider">마스터 로그인</div>
    <div class="login-master-row">
      <input type="password" id="master-pw" placeholder="마스터 비밀번호" style="width:100%;">
      <button class="btn btn-primary" onclick="loginMaster()">확인</button>
    </div>
    <div id="login-error" style="color:var(--red-text);font-size:12px;margin-top:8px;min-height:18px;"></div>
  </div>
</div>

<!-- 부품 추가/수정 모달 -->
<div class="modal-overlay" id="part-modal">
  <div class="modal" style="width:420px;">
    <div class="modal-title" id="part-modal-title">부품 추가</div>
    <div class="form-group" style="margin-bottom:12px;">
      <label class="form-label">부품명</label>
      <input type="text" id="part-name" placeholder="예: PCB 보드" style="width:100%;">
    </div>
    <div class="form-group" style="margin-bottom:12px;">
      <label class="form-label">카테고리</label>
      <input type="text" id="part-category" placeholder="예: 메인부품" style="width:100%;">
    </div>
    <div style="display:flex;gap:12px;margin-bottom:12px;">
      <div class="form-group" style="flex:1;">
        <label class="form-label">현재 재고</label>
        <input type="text" id="part-qty" placeholder="0" style="width:100%;">
      </div>
      <div class="form-group" style="flex:1;">
        <label class="form-label">최소 재고 (경고 기준)</label>
        <input type="text" id="part-min-qty" placeholder="5" style="width:100%;">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closePartModal()">취소</button>
      <button class="btn btn-primary" onclick="savePart()">저장</button>
    </div>
  </div>
</div>

<!-- 입고 모달 -->
<div class="modal-overlay" id="stock-in-modal">
  <div class="modal" style="width:380px;">
    <div class="modal-title">📥 입고 등록</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:14px;" id="stock-in-part-name"></div>
    <div class="form-group" style="margin-bottom:12px;">
      <label class="form-label">입고 수량</label>
      <input type="text" id="stock-in-qty" placeholder="수량 입력" style="width:100%;">
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <label class="form-label">메모 (선택)</label>
      <input type="text" id="stock-in-note" placeholder="예: 발주처, 입고 사유" style="width:100%;">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeStockInModal()">취소</button>
      <button class="btn btn-primary" onclick="saveStockIn()">입고 등록</button>
    </div>
  </div>
</div>

<!-- 교육자료 추가 모달 -->
<div class="modal-overlay" id="doc-modal">
  <div class="modal" style="width:460px;">
    <div class="modal-title">📚 자료 추가</div>
    <div class="form-group" style="margin-bottom:12px;">
      <label class="form-label">제목</label>

/* JSONP (GET) */
function gasCall(params) {
  return new Promise((resolve, reject) => {
    const cb = '__gas_' + Date.now() + '_' + (Math.random()*1e6|0);
    const qs = Object.entries({...params, callback:cb})
      .map(([k,v])=>`${encodeURIComponent(k)}=${encodeURIComponent(String(v))}`).join('&');
    const s = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); reject(new Error('timeout')); }, 20000);
    window[cb] = data => { cleanup(); resolve(data); };
    s.onerror = ()=>{ cleanup(); reject(new Error('error')); };
    s.src = GAS + '?' + qs;
    document.head.appendChild(s);
    function cleanup(){ clearTimeout(timer); delete window[cb]; s.remove(); }
  });
}

/* POST (대용량 데이터용) */
async function gasPost(params) {
  const res = await fetch(GAS, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(params)
  });
  return await res.json();
}

/* 동기화 상태 */

/* 전체 로드 */
async function syncData(silent=false) {
  setSyncStatus('loading');
  try {
    const data = await gasCall({action:'load'});
    entries = (data.entries || []).map(e => ({...e, model: e.model || detectModel(String(e.serial))}));
    // workers: 'name::T2' 형식 지원
    const rawWorkers = data.workers || [];
    workers = rawWorkers.map(w => String(w).split('::')[0]);
    tierMap = {};
    rawWorkers.forEach(w => {
      const parts = String(w).split('::');
      if(parts[1]) tierMap[parts[0]] = parts[1];
    });
    const rawKpi = data.kpiMap || {};
    kpiMap = {};
    Object.entries(rawKpi).forEach(([k, v]) => {
      const ks = String(k);
      // 정상: 2026-04 형식
      if(/^\d{4}-\d{2}$/.test(ks)) { kpiMap[ks] = Number(v); return; }
      // 비정상: YYYY-MM 패턴 추출
      const m1 = ks.match(/(\d{4})-(\d{2})/);
      if(m1) { kpiMap[`${m1[1]}-${m1[2]}`] = Number(v); return; }
      // 비정상: "Wed Apr 01 2026..." 형식 → Date로 파싱
      try {
        const d2 = new Date(ks);
        if(!isNaN(d2)) {
          const y2 = d2.getFullYear();
          const mo2 = String(d2.getMonth()+1).padStart(2,'0');
          kpiMap[`${y2}-${mo2}`] = Number(v);
        }
      } catch {}
    });
    stock = data.stock || [];
    stockLog = data.stockLog || [];
    docs = (data.docs || []).map(d => ({
      ...d,
      title: (d.title||'').replace(/\[CL\]/g,'::').replace(/\[PP\]/g,'||'),
      category: (d.category||'').replace(/\[CL\]/g,'::').replace(/\[PP\]/g,'||'),
      link: (d.link||'').replace(/\[CL\]/g,'::').replace(/\[PP\]/g,'||'),
      memo: (d.memo||'').replace(/\[BR\]/g,'\n').replace(/\[CL\]/g,'::').replace(/\[PP\]/g,'||')
    }));
    setSyncStatus('ok');
    renderAll();
    if(!silent) notify('데이터를 불러왔습니다.');
    if(!currentUser) buildLoginGrid();
  } catch {
    setSyncStatus('error');
    if(!silent) notify('서버 연결 실패. 인터넷을 확인하세요.','error');
  }
}

/* 수리 등록 */
async function addEntry() {
  const worker = document.getElementById('sel-worker').value;
  const serial = document.getElementById('inp-serial').value.trim();
  const works = getChecked();
  const note = document.getElementById('inp-note').value.trim();
  if(!worker){ notify('엔지니어를 선택하세요.','error'); return; }
  if(!serial){ notify('시리얼 번호를 입력하세요.','error'); return; }
  if(!works.length){ notify('수리 항목을 하나 이상 선택하세요.','error'); return; }
  if(busy){ notify('처리 중입니다. 잠시 기다려주세요.','error'); return; }
  // 시리얼 중복 체크
  const dup = entries.find(e => String(e.serial) === String(serial));
  if(dup) {
    notify(`⚠ 이미 등록된 시리얼 번호입니다! (${dup.worker} / ${fmtDT(dup.date)})`, 'error');
    document.getElementById('inp-serial').focus();
    return;
  }
  busy = true;
  const btn = document.getElementById('btn-add');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    const id = Date.now(), date = new Date().toISOString();
    const total = works.reduce((s,k)=>s+WORKS[k].price, 0);
    const model = getModel();
    await gasCall({action:'add', id, worker, serial, works:JSON.stringify(works), total, date, note, model});
    entries.push({id, worker, serial, works, total, date, note, model});
    document.getElementById('inp-serial').value = '';
    document.getElementById('inp-note').value = '';
    document.getElementById('inp-model').value = '';
    document.getElementById('model-auto').textContent = '';
    document.getElementById('model-auto').style.display = 'none';
    document.getElementById('inp-model').style.display = 'block';
    clearChecks(); renderToday();
    notify(`${serial} 수리 등록 완료!`);
    // 재고 자동 차감
    if(stock.length) deductStock(works);
  } catch { notify('저장 실패. 다시 시도해주세요.','error'); }
  busy = false; btn.disabled = false; btn.textContent = '수리 등록';
}

/* ===== 공휴일 API ===== */
async function fetchHolidays(year, month) {
  const key = `${year}-${String(month).padStart(2,'0')}`;
  if(holidayCache[key] !== undefined) return holidayCache[key];
  return new Promise(resolve => {
    const cb = '__holi_' + Date.now();
    const url = `https://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService/getHoliDeInfo?serviceKey=${HOLIDAY_KEY}&solYear=${year}&solMonth=${String(month).padStart(2,'0')}&_type=json&numOfRows=50&callback=${cb}`;
    const s = document.createElement('script');
    const timer = setTimeout(()=>{ cleanup(); holidayCache[key]=[]; resolve([]); }, 5000);
    window[cb] = (json) => {
      cleanup();
      try {
        const items = json?.response?.body?.items?.item;
        let dates = [];
        if(items) {
          const arr = Array.isArray(items) ? items : [items];
          dates = arr.filter(it=>it.isHoliday==='Y').map(it => {
            const s2 = String(it.locdate);
            return `${s2.slice(0,4)}-${s2.slice(4,6)}-${s2.slice(6,8)}`;
          });
        }
        holidayCache[key] = dates;
        resolve(dates);
      } catch { holidayCache[key]=[]; resolve([]); }
    };
    s.onerror = ()=>{ cleanup(); holidayCache[key]=[]; resolve([]); };
    s.src = url;
    document.head.appendChild(s);
    function cleanup(){ clearTimeout(timer); delete window[cb]; s.remove(); }
  });
}

async function getWorkdays(year, month) {
  const holidays = await fetchHolidays(year, month);
  const daysInMonth = new Date(year, month, 0).getDate();
  let count = 0;
  for(let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(year, month-1, d);
    const dow = dt.getDay();
    if(dow === 0 || dow === 6) continue;
    const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(holidays.includes(ds)) continue;
    count++;
  }
  return count;
}

async function getDailyTarget(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const y = d.getFullYear(), m = d.getMonth()+1;
  const monthKey = `${y}-${String(m).padStart(2,'0')}`;
  const monthKPI = kpiMap[monthKey] || 0;
  if(!monthKPI) return 0;
  const activeWorkers = workers.filter(w => w !== MASTER_NAME).length;
  if(!activeWorkers) return 0;
  const workdays = await getWorkdays(y, m);
  if(!workdays) return 0;
  return Math.ceil(monthKPI / workdays / activeWorkers);
}

function exportReportCSV() {
  const monthVal = document.getElementById('report-month').value;
  if(!monthVal){ notify('년월을 선택하세요.','error'); return; }
  const [y, m] = monthVal.split('-').map(Number);
  const monthKPI = kpiMap[monthVal] || 0;
  const monthEntries = entries.filter(e => String(e.date).startsWith(monthVal));
  const activeWorkers = workers.filter(w => w !== MASTER_NAME);
  const totalDone = monthEntries.length;
  const totalRev = monthEntries.reduce((s,e)=>s+Number(e.total),0);
  const pct = monthKPI ? Math.min(100, Math.round(totalDone/monthKPI*100)) : 0;

  const hd = '엔지니어,수리건수,월목표,달성률(%),공임비합계(원)';
  const ls = activeWorkers.map(w => {
    const wEntries = monthEntries.filter(e=>e.worker===w);
    const cnt = wEntries.length;
    const wrev = wEntries.reduce((s,e)=>s+Number(e.total),0);
    return `${w},${cnt},${monthKPI||'-'},${monthKPI?Math.round(cnt/(monthKPI/activeWorkers.length)*100)+'%':'-'},${wrev}`;
  });
  ls.push(`합계,${totalDone},${monthKPI||'-'},${monthKPI?pct+'%':'-'},${totalRev}`);

  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+[hd,...ls].join('\n')],{type:'text/csv'}));
  a.download = `폼즈AS_실적리포트_${monthVal}.csv`;
  a.click(); notify('실적 리포트 CSV 내보내기 완료!');
}

async function renderKPI() {
  const isM = isMaster;
  document.getElementById('kpi-form').style.display = isM ? 'block' : 'none';
  document.getElementById('kpi-master-only').style.display = isM ? 'none' : 'block';

function renderKPIList() {
  const el = document.getElementById('kpi-list');
  const keys = Object.keys(kpiMap).sort((a,b)=>b.localeCompare(a));
  if(!keys.length){ el.innerHTML='<div class="empty" style="padding:20px;">저장된 KPI가 없습니다.</div>'; return; }
  el.innerHTML = keys.map(k=>{
    const [ky, km2] = k.split('-');
    const label = `${ky}년 ${Number(km2)}월`;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);">
      <div>
        <span style="font-weight:600;">${label}</span>
        <span style="color:var(--text2);font-size:13px;margin-left:12px;">월 목표 ${fmt(kpiMap[k])}대</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:12px;color:var(--text3);" id="wd-${k.replace('-','_')}">계산 중...</span>
        <button class="btn btn-sm btn-danger" onclick="deleteKPI('${k}')">삭제</button>
      </div>
    </div>`;
  }).join('');
  // 각 월 평일 수 표시
  keys.forEach(async k => {
    const [y,m] = k.split('-').map(Number);
    const wd = await getWorkdays(y, m);
    const ac = workers.filter(w=>w!==MASTER_NAME).length;
    const daily = ac ? Math.ceil(kpiMap[k]/wd/ac) : 0;
    const el2 = document.getElementById('wd-'+k.replace('-','_'));
    if(el2) el2.textContent = `평일 ${wd}일 · 1인 하루 ${daily}건`;
  });
}

async function updateKPIPreview() {
  const monthVal = document.getElementById('kpi-month').value;
  const kpiVal = Number(document.getElementById('kpi-value').value);
  const el = document.getElementById('kpi-calc-preview');
  if(!monthVal || !kpiVal){ el.textContent=''; return; }
  const [y,m] = monthVal.split('-').map(Number);
  const wd = await getWorkdays(y, m);
  const ac = workers.filter(w=>w!==MASTER_NAME).length;
  const daily = ac && wd ? Math.ceil(kpiVal/wd/ac) : 0;
  el.textContent = `→ 평일 ${wd}일 기준 · 작업자 ${ac}명 · 1인 하루 목표 ${daily}건`;
}

async function saveKPI() {
  const monthVal = document.getElementById('kpi-month').value;
  const kpiVal = Number(document.getElementById('kpi-value').value);
  if(!monthVal){ notify('년월을 선택하세요.','error'); return; }
  if(!kpiVal || kpiVal <= 0){ notify('목표 수량을 입력하세요.','error'); return; }
  // 저장 전 최신 서버 데이터 한 번 더 불러오기
  try {
    const latest = await gasCall({action:'load'});
    const raw = latest.kpiMap || {};
    kpiMap = {};
    Object.entries(raw).forEach(([k,v])=>{
      if(/^\d{4}-\d{2}$/.test(k)){ kpiMap[k]=v; return; }
      const m2 = String(k).match(/(\d{4})-(\d{2})/);
      if(m2) kpiMap[`${m2[1]}-${m2[2]}`]=v;
    });
  } catch {}
  kpiMap[monthVal] = kpiVal;
  const kpiData = Object.entries(kpiMap).map(([k,v])=>`${k}:${v}`).join('||');
  try {
    await gasCall({action:'saveKPI', kpiData});
    document.getElementById('kpi-value').value = '';
    // 저장 완료 후 서버에서 다시 불러와서 확인
    const verify = await gasCall({action:'load'});
    const raw2 = verify.kpiMap || {};
    kpiMap = {};
    Object.entries(raw2).forEach(([k,v])=>{
      if(/^\d{4}-\d{2}$/.test(k)){ kpiMap[k]=v; return; }
      const m2 = String(k).match(/(\d{4})-(\d{2})/);
      if(m2) kpiMap[`${m2[1]}-${m2[2]}`]=v;
    });
    renderKPIList();
    notify(`${monthVal} KPI ${fmt(kpiVal)}대 저장 완료!`);
  } catch { notify('저장 실패. 다시 시도해주세요.','error'); }
}

function deleteKPI(key) {
  const [ky, km2] = key.split('-');
  openModal('KPI 삭제', `${ky}년 ${Number(km2)}월 KPI를 삭제할까요?`, async()=>{
    delete kpiMap[key];
    const kpiData = Object.entries(kpiMap).map(([k,v])=>`${k}:${v}`).join('||');
    try {
      await gasCall({action:'saveKPI', kpiData});
      // 삭제 후 서버에서 다시 확인
      const verify = await gasCall({action:'load'});
      const raw = verify.kpiMap || {};
      kpiMap = {};
      Object.entries(raw).forEach(([k,v])=>{
        if(/^\d{4}-\d{2}$/.test(k)){ kpiMap[k]=v; return; }
        const m2 = String(k).match(/(\d{4})-(\d{2})/);
        if(m2) kpiMap[`${m2[1]}-${m2[2]}`]=v;
      });
      renderKPIList();
      notify('삭제되었습니다.');
    } catch { notify('삭제 실패.','error'); }
  });
}

/* ===== 축하 팡파레 ===== */
let cheerTimer, cheerTimer2;
let alreadyCheered = new Set(); // 이미 축하한 엔지니어 (날짜별)

function launchConfetti() {
  const colors = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#db2777'];
  const count = 120;
  for(let i = 0; i < count; i++) {
    setTimeout(()=>{
      const el = document.createElement('div');
      const color = colors[Math.floor(Math.random()*colors.length)];
      const size = Math.random()*8+4;
      const left = Math.random()*100;
      const duration = Math.random()*2+1.5;
      el.style.cssText = `position:fixed;top:-10px;left:${left}vw;width:${size}px;height:${size}px;background:${color};border-radius:${Math.random()>0.5?'50%':'2px'};z-index:9997;pointer-events:none;animation:confettiFall ${duration}s ease-in forwards;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), duration*1000+100);
    }, i*15);
  }
}

function showCheer(name) {
  const emojis = ['🎉','🏆','🥳','🎊','⭐','🔥'];
  const msgs = ['목표 건수를 달성했습니다!','오늘의 목표 완료!','훌륭해요! 목표 달성!','최고입니다!'];
  const el = document.getElementById('cheer-toast');
  document.getElementById('cheer-emoji').textContent = emojis[Math.floor(Math.random()*emojis.length)];
  document.getElementById('cheer-name').textContent = name + '님';
  document.getElementById('cheer-msg').textContent = msgs[Math.floor(Math.random()*msgs.length)];
  el.classList.add('show');
  launchConfetti();
  clearTimeout(cheerTimer);
  cheerTimer = setTimeout(()=>el.classList.remove('show'), 4000);
}

function checkAchievements(list, dailyTarget, activeWorkers) {
  if(!dailyTarget) return;
  const sel = getDate('summary');
  activeWorkers.forEach(w => {
    const key = `${sel}_${w}`;
    const cnt = list.filter(e=>e.worker===w).length;
    if(cnt >= dailyTarget && !alreadyCheered.has(key)) {
      alreadyCheered.add(key);
      setTimeout(()=>showCheer(w), 300);
    }
  });
}

let lastSearch = '';

/* 시리얼 조회용 삭제 */
function delSearch(id) {
  const e = entries.find(x=>String(x.id)===String(id)); if(!e) return;
  openModal('수리 내역 삭제',`${e.serial} (${e.worker}) 수리 내역을 삭제할까요?`, async()=>{
    try {
      await gasCall({action:'delete', id});
      entries = entries.filter(x=>String(x.id)!==String(id));
      renderToday(); doSearch();
      notify('삭제되었습니다.');
    } catch { notify('삭제 실패. 다시 시도해주세요.','error'); }
  });
}

/* 엔지니어 관리 */
async function addWorker() {
  const n = document.getElementById('inp-worker').value.trim();
  if(!n){ notify('이름을 입력하세요.','error'); return; }
  if(workers.includes(n)){ notify('이미 있는 엔지니어입니다.','error'); return; }
  workers.push(n);
  try {
    await gasCall({action:'saveWorkers', workers:workers.map(w=>tierMap[w]?`${w}::${tierMap[w]}`:w).join('||')});
    document.getElementById('inp-worker').value = '';
    renderWorkerSel(); renderWorkers(); notify(`${n} 추가됨`);
  } catch { workers.pop(); notify('저장 실패. 다시 시도해주세요.','error'); }
}
document.getElementById('inp-worker').addEventListener('keydown', e=>{if(e.key==='Enter')addWorker();});

function removeWorker(name) {
  const cnt = entries.filter(e=>e.worker===name).length;
  openModal('엔지니어 삭제',
    cnt ? `"${name}" 엔지니어를 목록에서 제거합니다. (기존 수리 기록 ${cnt}건은 유지됩니다.) 계속할까요?`
        : `"${name}" 엔지니어를 삭제할까요?`,
    async()=>{
      workers = workers.filter(w=>w!==name);
      try {
        await gasCall({action:'saveWorkers', workers:workers.map(w=>tierMap[w]?`${w}::${tierMap[w]}`:w).join('||')});
        renderWorkerSel(); renderWorkers(); notify(`${name} 삭제됨`);
      } catch { notify('삭제 실패.','error'); }
    });
}
function renderWorkers() {
  const el = document.getElementById('worker-list');
  if(!workers.length){ el.innerHTML='<div class="empty">등록된 엔지니어가 없습니다.</div>'; return; }
  const ts = todayStr();
  el.innerHTML = workers.map(w=>{
    const ct = entries.filter(e=>e.worker===w&&String(e.date).startsWith(ts)).length;
    const ca = entries.filter(e=>e.worker===w).length;
    const tier = tierMap[w] || '';
    return `<div class="worker-mgmt-item">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:14px;font-weight:500;">${w}</span>
        ${tierBadge(tier)}
        <span style="font-size:12px;color:var(--text2);">오늘 ${ct}건 / 전체 ${ca}건</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        ${isMaster ? `
        <select onchange="saveTier('${w}',this.value)" style="height:30px;padding:0 8px;font-size:12px;border:1px solid var(--border2);border-radius:var(--radius-sm);">
          <option value="">직급 없음</option>
          ${['T1','T2','T3','T4'].map(t=>`<option value="${t}" ${tier===t?'selected':''}>${t}</option>`).join('')}
        </select>
        <button class="btn btn-sm btn-danger" onclick="removeWorker('${w}')">삭제</button>` 
        : `<span style="font-size:11px;color:var(--text3);">마스터 전용</span>`}
      </div>
    </div>`;
  }).join('');
}

async function saveTier(name, tier) {
  tierMap[name] = tier || undefined;
  if(!tier) delete tierMap[name];
  const workerData = workers.map(w => tierMap[w] ? `${w}::${tierMap[w]}` : w).join('||');
  try {
    await gasCall({action:'saveWorkers', workers: workerData});
    renderWorkers();
    renderWorkerSel();
    notify(`${name} 직급이 ${tier||'없음'}으로 변경되었습니다.`);
  } catch { notify('저장 실패.','error'); }
}

/* CSV */
function exportCSV(mode) {
  let rows, fn;
  if(mode==='range') {
    rows = getRangeEntries().sort((a,b)=>new Date(b.date)-new Date(a.date));
    const from = document.getElementById('date-from').value || '전체';
    const to = document.getElementById('date-to').value || '전체';
    fn = `폼즈AS_${from}_${to}.csv`;
  } else {
    const sel = getDate('input');
    rows = entries.filter(e=>String(e.date).startsWith(sel));
    fn = `폼즈AS_${sel}.csv`;
  }
  if(!rows.length){ notify('내보낼 데이터가 없습니다.','error'); return; }
  const hd = '번호,날짜,엔지니어,기종,시리얼번호,수리항목,공임비(원),특이사항,등록시각';
  const ls = rows.map((e,i)=>{
    const ws = parseWorks(e.works);
    return `${i+1},${String(e.date).slice(0,10)},${e.worker},${e.model||'-'},${e.serial},"${ws.map(k=>WORKS[k]?.label||k).join(' / ')}",${e.total},"${e.note||''}",${fmtDT(e.date)}`;
  });
  const totalRev = rows.reduce((s,e)=>s+Number(e.total),0);
  const summary = `,,,,합계,${totalRev},,`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+[hd,...ls,summary].join('\n')],{type:'text/csv'}));
  a.download = fn; a.click(); notify('CSV 내보내기 완료!');
}


/* ===== 재고 관리 ===== */
let editPartId = null;
let stockInPartId = null;

function renderStock() {
  // 마스터만 부품 추가 버튼 표시
  document.getElementById('add-part-btn').style.display = isMaster ? 'inline-flex' : 'none';
  const el = document.getElementById('stock-content');
  if(!stock.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📦</div>등록된 부품이 없습니다.${isMaster ? '<br><button class="btn btn-primary" style="margin-top:12px;" onclick="openAddPartModal()">+ 부품 추가</button>' : ''}</div>`;
    return;
  }
  // 카테고리별 그룹
  const cats = [...new Set(stock.map(p => p.category || '기타'))].sort();
  let h = '';
  cats.forEach(cat => {
    const parts = stock.filter(p => (p.category || '기타') === cat);
    h += `<div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;">${cat}</div>`;
    h += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:8px;">`;
    parts.forEach(p => {
      const isLow = p.qty <= p.minQty;
      const isEmpty = p.qty <= 0;
      const color = isEmpty ? 'var(--red)' : isLow ? 'var(--amber)' : 'var(--green)';
      const bg = isEmpty ? 'var(--red-bg)' : isLow ? 'var(--amber-bg)' : 'var(--green-bg)';
      h += `<div style="background:var(--surface);border:1px solid ${isEmpty?'#fca5a5':isLow?'#fcd34d':'var(--border)'};border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);">
        <div style="font-size:13px;font-weight:600;margin-bottom:6px;">${p.name}</div>
        <div style="font-size:28px;font-weight:700;color:${color};margin-bottom:4px;">${p.qty}<span style="font-size:13px;color:var(--text2);font-weight:400;">개</span></div>
        ${isEmpty ? '<div style="font-size:11px;color:var(--red-text);font-weight:600;">⚠ 재고 없음</div>' : isLow ? `<div style="font-size:11px;color:var(--amber-text);font-weight:600;">⚠ 재고 부족 (최소 ${p.minQty}개)</div>` : `<div style="font-size:11px;color:var(--green-text);">✓ 정상</div>`}
        <div style="display:flex;gap:6px;margin-top:10px;">
          <button class="btn btn-sm btn-primary" style="flex:1;" onclick="openStockInModal('${p.id}')">입고</button>
          ${isMaster ? `<button class="btn btn-sm" onclick="openEditPartModal('${p.id}')">수정</button>
          <button class="btn btn-sm btn-danger" onclick="deletePart('${p.id}')">삭제</button>` : ''}
        </div>
      </div>`;
    });
    h += '</div>';
  });

  // 최근 이력
  if(stockLog.length) {
    const recent = [...stockLog].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10);
    h += `<div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 8px;">최근 입출고 이력</div>
    <div class="card" style="padding:0;"><div class="table-wrap"><table>
      <thead><tr><th>날짜</th><th>부품명</th><th>구분</th><th style="text-align:right">수량</th><th>메모</th><th>작업자</th></tr></thead>
      <tbody>${recent.map(l=>`<tr>
        <td style="font-size:11px;font-family:'JetBrains Mono',monospace;">${fmtDT(l.date)}</td>
        <td>${l.partName}</td>
        <td><span class="badge ${l.type==='in'?'badge-ok':'badge-under'}">${l.type==='in'?'입고':'출고'}</span></td>
        <td style="text-align:right;font-weight:600;color:${l.type==='in'?'var(--green)':'var(--red)'};">${l.type==='in'?'+':'−'}${l.qty}</td>
        <td style="font-size:12px;color:var(--text2);">${l.note||'-'}</td>
        <td style="font-size:12px;">${l.worker||'-'}</td>
      </tr>`).join('')}</tbody>
    </table></div></div>`;
  }
  el.innerHTML = h;
}

function openAddPartModal() {
  editPartId = null;
  document.getElementById('part-modal-title').textContent = '부품 추가';
  document.getElementById('part-name').value = '';
  document.getElementById('part-category').value = '';
  document.getElementById('part-qty').value = '';
  document.getElementById('part-min-qty').value = '5';
  document.getElementById('part-modal').classList.add('open');
}
function openEditPartModal(id) {
  const p = stock.find(x=>x.id===id); if(!p) return;
  editPartId = id;
  document.getElementById('part-modal-title').textContent = '부품 수정';
  document.getElementById('part-name').value = p.name;
  document.getElementById('part-category').value = p.category || '';
  document.getElementById('part-qty').value = p.qty;
  document.getElementById('part-min-qty').value = p.minQty || 0;
  document.getElementById('part-modal').classList.add('open');
}
function closePartModal() { document.getElementById('part-modal').classList.remove('open'); }

async function savePart() {
  const name = document.getElementById('part-name').value.trim();
  const category = document.getElementById('part-category').value.trim();
  const qty = Number(document.getElementById('part-qty').value) || 0;
  const minQty = Number(document.getElementById('part-min-qty').value) || 0;
  if(!name){ notify('부품명을 입력하세요.','error'); return; }
  if(editPartId) {
    const idx = stock.findIndex(x=>x.id===editPartId);
    if(idx>-1) stock[idx] = {...stock[idx], name, category, qty, minQty};
  } else {
    stock.push({id:'p'+Date.now(), name, category, qty, minQty});
  }
  await saveStockToServer();
  closePartModal();
  renderStock();
  notify(editPartId ? '수정되었습니다.' : '부품이 추가되었습니다.');
}

function deletePart(id) {
  const p = stock.find(x=>x.id===id); if(!p) return;
  openModal('부품 삭제', `"${p.name}" 부품을 삭제할까요?`, async()=>{
    stock = stock.filter(x=>x.id!==id);
    await saveStockToServer();
    renderStock();
    notify('삭제되었습니다.');
  });
}

async function saveStockToServer() {
  const stockData = stock.map(p=>`${p.id}::${p.name}::${p.qty}::${p.category||''}::${p.minQty||0}`).join('||');
  await gasCall({action:'saveStock', stockData});
}

function openStockInModal(partId) {
  stockInPartId = partId;
  const p = stock.find(x=>x.id===partId);
  document.getElementById('stock-in-part-name').textContent = p ? `부품: ${p.name} (현재 ${p.qty}개)` : '';
  document.getElementById('stock-in-qty').value = '';
  document.getElementById('stock-in-note').value = '';
  document.getElementById('stock-in-modal').classList.add('open');
}
function closeStockInModal() { document.getElementById('stock-in-modal').classList.remove('open'); }

async function saveStockIn() {
  const qty = Number(document.getElementById('stock-in-qty').value);
  const note = document.getElementById('stock-in-note').value.trim();
  if(!qty || qty <= 0){ notify('수량을 입력하세요.','error'); return; }
  const idx = stock.findIndex(x=>x.id===stockInPartId);
  if(idx === -1) return;
  stock[idx].qty += qty;
  const logId = 'l'+Date.now();
  const logDate = new Date().toISOString();
  const log = {logId, partId:stockInPartId, partName:stock[idx].name, type:'in', qty, note, date:logDate, worker:currentUser||''};
  stockLog.push(log);
  try {
    await saveStockToServer();
    await gasCall({action:'addStockLog', ...log});
    closeStockInModal();
    renderStock();
    notify(`${stock[idx].name} ${qty}개 입고 완료!`);
  } catch { notify('저장 실패.','error'); }
}

// 수리 등록 시 재고 자동 차감
async function deductStock(works) {
  const workToPartMap = {
    pcb: 'PCB', panel: '패널', board: '메인보드', nonbat: '논배터리'
  };
  for(const w of works) {
    const keyword = workToPartMap[w];
    if(!keyword) continue;
    const idx = stock.findIndex(p => p.name.includes(keyword));
    if(idx > -1 && stock[idx].qty > 0) {
      stock[idx].qty -= 1;
      const logId = 'l'+Date.now()+(Math.random()*1000|0);
      const logDate = new Date().toISOString();
      const log = {logId, partId:stock[idx].id, partName:stock[idx].name, type:'out', qty:1, note:'수리 자동 차감', date:logDate, worker:currentUser||''};
      stockLog.push(log);
      try {
        await saveStockToServer();
        await gasCall({action:'addStockLog', ...log});
      } catch {}
    }
  }
}

/* ===== 교육 자료 ===== */
function renderDocs() {
  document.getElementById('add-doc-btn').style.display = isMaster ? 'inline-flex' : 'none';
  const sel = document.getElementById('docs-category-filter');
  const curCat = sel.value;
  const cats = [...new Set(docs.map(d=>d.category||'기타'))].sort();
  sel.innerHTML = '<option value="">전체 카테고리</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  if(cats.includes(curCat)) sel.value = curCat;

  const filterCat = sel.value;
  const filtered = filterCat ? docs.filter(d=>(d.category||'기타')===filterCat) : docs;
  const el = document.getElementById('docs-content');

  if(!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📚</div>등록된 교육 자료가 없습니다.${isMaster?'<br><button class="btn btn-primary" style="margin-top:12px;" onclick="openAddDocModal()">+ 자료 추가</button>':''}</div>`;
    return;
  }

  const typeIcon = {link:'🔗', youtube:'▶', pdf:'📄', memo:'📝'};
  const typeLabel = {link:'링크', youtube:'유튜브', pdf:'PDF', memo:'메모'};
  const typeBg = {link:'#eff6ff', youtube:'#fef2f2', pdf:'#f0fdf4', memo:'#fffbeb'};
  const typeBorder = {link:'#bfdbfe', youtube:'#fecaca', pdf:'#bbf7d0', memo:'#fde68a'};

  let h = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;">';
  filtered.forEach(d => {
    const isMemo = (d.type === 'memo') || !d.link;
    const memoText = (d.memo || '').replace(/\[BR\]/g, '\n');
    const memoHtml = memoText ? memoText.replace(/\n/g, '<br>') : '';
    const bg = typeBg[d.type] || 'var(--surface)';
    const border2 = typeBorder[d.type] || 'var(--border)';
    h += `<div style="background:${isMemo?bg:'var(--surface)'};border:1px solid ${isMemo?border2:'var(--border)'};border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span style="font-size:11px;background:rgba(0,0,0,.06);padding:3px 9px;border-radius:99px;color:var(--text2);font-weight:600;">${d.category||'기타'}</span>
        <span style="font-size:12px;color:var(--text3);">${typeIcon[d.type]||'🔗'} ${typeLabel[d.type]||'링크'}</span>
      </div>
      <div style="font-size:15px;font-weight:700;margin-bottom:${memoHtml?'10px':'0'};line-height:1.4;color:var(--text);">${d.title}</div>
      ${memoHtml?`<div style="font-size:13px;color:var(--text2);line-height:1.8;flex:1;">${memoHtml}</div>`:''}
      <div style="display:flex;gap:6px;margin-top:12px;">
        ${d.link?`<a href="${d.link}" target="_blank" class="btn btn-sm btn-primary" style="flex:1;text-align:center;text-decoration:none;">열기</a>`:''}
        ${isMaster?`<button class="btn btn-sm btn-danger" onclick="deleteDoc('${d.id}')">삭제</button>`:''}
      </div>
    </div>`;
  });
  h += '</div>';
  el.innerHTML = h;
}
function openAddDocModal() {
  document.getElementById('doc-title').value = '';
  document.getElementById('doc-category').value = '';
  document.getElementById('doc-link').value = '';
  document.getElementById('doc-memo').value = '';
  document.getElementById('doc-type').value = 'link';
  document.getElementById('doc-modal').classList.add('open');
}
function closeDocModal() { document.getElementById('doc-modal').classList.remove('open'); }

async function saveDoc() {
  const title = document.getElementById('doc-title').value.trim();
  const category = document.getElementById('doc-category').value.trim();
  const type = document.getElementById('doc-type').value;
  const link = document.getElementById('doc-link').value.trim();
  const memo = document.getElementById('doc-memo').value.trim();
  if(!title){ notify('제목을 입력하세요.','error'); return; }
  const id = 'd'+Date.now();
  const date = new Date().toISOString();
  try {
    const escapeMemo = m => (m||'').replace(/\n/g,'[BR]').replace(/::/g,'[CL]');
    await gasCall({action:'addDoc', id, title, category:category||'기타', type, link, memo:escapeMemo(memo), date});
    docs.push({id, title, category:category||'기타', type, link, memo, date});
    closeDocModal();
    renderDocs();
    notify('자료가 추가되었습니다!');
  } catch { notify('저장 실패.','error'); }
}

function deleteDoc(id) {
  const d = docs.find(x=>x.id===id); if(!d) return;
  openModal('자료 삭제', `"${d.title}" 자료를 삭제할까요?`, async()=>{
    try {
      await gasCall({action:'deleteDoc', id});
      docs = docs.filter(x=>x.id!==id);
      renderDocs();
      notify('삭제되었습니다.');
    } catch { notify('삭제 실패.','error'); }
  });
}
init();
</script>
